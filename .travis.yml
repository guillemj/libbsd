language: c
compiler:
  - gcc
sudo: false
env:
  global:
  # The next declaration is the encrypted COVERITY_SCAN_TOKEN, created
  # via the "travis encrypt" command using the project repo's public key
  - secure: ""
addons:
  apt:
    packages:
    - libtool
  coverity_scan:
    project:
      name: guillemj/libbsd
      description: BSD compatibility library
    notification_email: guillem@hadrons.org
    build_command_prepend: ./autogen && ./configure
    build_command: make
    branch_pattern: coverity_scan
script:
  - if [ ${COVERITY_SCAN_BRANCH} != 1 ]; then ./autogen && ./configure && make check; fi
